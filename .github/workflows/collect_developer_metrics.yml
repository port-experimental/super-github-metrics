name: collect_developer_metrics
on:
    workflow_dispatch:
    schedule:
      - cron: '0 0 * * *'
jobs:
    my-job:
      name: collect_developer_metrics
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: oven-sh/setup-bun@v2
        - run: bun run src/github/main.ts get-developer-stats
          env: # Or as an environment variable
            X_GITHUB_ORG: ${{ secrets.X_GITHUB_ORG }}
            X_GITHUB_ENTERPRISE: ${{ secrets.X_GITHUB_ENTERPRISE }}
            X_GITHUB_AUTH_TOKEN: ${{ secrets.X_GITHUB_AUTH_TOKEN }}
            PORT_CLIENT_ID: ${{ secrets.PORT_CLIENT_ID }}
            PORT_CLIENT_SECRET: ${{ secrets.PORT_CLIENT_SECRET }}
