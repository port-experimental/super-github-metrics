name: collect_timeseries_service_metrics
on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  timeseries_service_metrics:
    name: timeseries_service_metrics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun run timeseries-service-metrics
        env:
          X_GITHUB_ORGS: ${{ secrets.X_GITHUB_ORGS }}
          X_GITHUB_ENTERPRISE: ${{ secrets.X_GITHUB_ENTERPRISE }}
          X_GITHUB_APP_ID: ${{ secrets.X_GITHUB_APP_ID }}
          X_GITHUB_APP_PRIVATE_KEY: ${{ secrets.X_GITHUB_APP_PRIVATE_KEY }}
          X_GITHUB_APP_INSTALLATION_ID: ${{ secrets.X_GITHUB_APP_INSTALLATION_ID }}
          PORT_CLIENT_ID: ${{ secrets.PORT_CLIENT_ID }}
          PORT_CLIENT_SECRET: ${{ secrets.PORT_CLIENT_SECRET }} 